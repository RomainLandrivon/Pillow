<style>
:root{
  --nuit:#191221;
  --nuit-2:#241A30;
  --nuit-3:#2E2240;
  --bord:#3A2C4A;
  --ivoire:#F2ECE4;
  --brume:#9A8CAC;
  --beurre:#F5C24C;
  --rose:#E4738F;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;min-width:0}
html,body{
  background:var(--nuit);color:var(--ivoire);
  width:100%;max-width:100%;overflow-x:hidden;   /* rien ne dépasse latéralement */
  overscroll-behavior-x:none;                     /* pas de rebond horizontal */
  touch-action:manipulation;                      /* coupe le zoom au double-tap, garde le pincement */
  -webkit-text-size-adjust:100%;                  /* iOS n'agrandit pas le texte tout seul */
}
body{
  font-family:"Instrument Sans",system-ui,sans-serif;
  font-size:15px;line-height:1.45;
  padding-bottom:calc(76px + var(--safe-b));
  overscroll-behavior-y:none;
}
img,svg{max-width:100%}
h1,h2,h3{font-family:"Bricolage Grotesque",system-ui,sans-serif;letter-spacing:-.02em;line-height:1.05}
.mono{font-family:"IBM Plex Mono",monospace}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font:inherit;color:var(--ivoire);background:var(--nuit-2);border:1px solid var(--bord);border-radius:10px;padding:11px 13px;width:100%}
input:focus,select:focus,button:focus-visible{outline:2px solid var(--beurre);outline-offset:2px}
input::placeholder{color:var(--brume)}

header{
  position:sticky;top:0;z-index:20;background:rgba(25,18,33,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--bord);
  padding:calc(var(--safe-t) + 18px) 20px 14px;
  display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
}
header h1{font-size:27px;font-weight:800}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--brume);font-weight:600}
main{padding:18px 20px 20px;max-width:720px;margin:0 auto}

nav{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:var(--nuit);
  border-top:1px solid var(--bord);
  display:grid;grid-template-columns:repeat(5,1fr);
  padding-bottom:var(--safe-b);
}
nav button{padding:11px 2px 13px;display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--brume);font-size:9.5px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--beurre)}

.card{background:var(--nuit-2);border:1px solid var(--bord);border-radius:16px;overflow:hidden}
.row{display:flex;gap:14px;align-items:stretch}
.poster{width:64px;flex:0 0 64px;background:var(--nuit-3);background-size:cover;background-position:center;border-radius:10px;display:grid;place-items:center;font-family:"Bricolage Grotesque";font-weight:800;color:var(--brume);font-size:19px}
.poster.wide{width:78px;flex-basis:78px}

/* ---- signature : la grille d'épisodes ---- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:6px}
.ep{
  aspect-ratio:1/1;border-radius:8px;border:1px solid var(--bord);
  background:var(--nuit-3);color:var(--brume);
  font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:600;
  display:grid;place-items:center;
  transition:transform .12s cubic-bezier(.3,1.4,.5,1),background .16s,color .16s,border-color .16s;
}
.ep:active{transform:scale(.88)}
.ep.vu{background:var(--beurre);color:#2A1D07;border-color:var(--beurre)}
.ep.suivant{border-color:var(--beurre);color:var(--beurre);box-shadow:inset 0 0 0 1px var(--beurre)}
@media (prefers-reduced-motion:reduce){.ep{transition:none}.ep:active{transform:none}}

/* ---- cartes Découverte ---- */
.cartes{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:13px}
.cartes.trois{grid-template-columns:repeat(3,1fr)}
.tuile .coche{position:absolute;right:6px;bottom:6px;width:29px;height:29px;border-radius:50%;background:var(--beurre);display:grid;place-items:center;box-shadow:0 2px 9px rgba(0,0,0,.55)}
.tuile .coche svg{width:15px;height:15px;stroke:#2A1D07;fill:none;stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round}
.tuile{text-align:left;display:flex;flex-direction:column;gap:7px;min-width:0}
.tuile .aff{position:relative;aspect-ratio:2/3;border-radius:11px;background:var(--nuit-3);background-size:cover;background-position:center;border:1px solid var(--bord);display:grid;place-items:center;font-family:"Bricolage Grotesque";font-weight:800;color:var(--brume);overflow:hidden}
.tuile .plus{position:absolute;right:6px;bottom:6px;width:28px;height:28px;border-radius:50%;background:var(--beurre);color:#2A1D07;display:grid;place-items:center;font-size:19px;font-family:"Bricolage Grotesque";font-weight:600;box-shadow:0 2px 9px rgba(0,0,0,.5)}
.tuile .marque{position:absolute;left:6px;top:6px;font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:600;letter-spacing:.06em;padding:2px 6px;border-radius:999px;background:rgba(25,18,33,.85);color:var(--ivoire);border:1px solid var(--bord)}
.tuile .nom{font-size:13px;font-weight:600;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tuile .pq{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--brume);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tuile.dedans .aff{opacity:.32}
.tuile:active .aff{transform:scale(.97)}
/* ---- accordéon de l'historique ---- */
.ligne{display:flex;align-items:center;gap:10px;width:100%;padding:13px 14px;text-align:left}
.ligne.sous{padding:9px 0;border-top:1px solid var(--bord)}
.chev{stroke:var(--brume);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;transition:transform .18s ease}
.chev.on{transform:rotate(90deg);stroke:var(--beurre)}
@media (prefers-reduced-motion:reduce){.chev{transition:none}}
.chip{font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:999px;border:1px solid var(--bord);color:var(--brume)}
.chip.on{background:var(--nuit-3);color:var(--beurre);border-color:var(--beurre)}
.pill{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:999px;border:1px solid var(--bord);color:var(--brume)}
.bar{height:3px;background:var(--nuit-3);border-radius:999px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--beurre);border-radius:999px}
.vide{text-align:center;padding:52px 22px;color:var(--brume)}
.vide h3{font-size:19px;color:var(--ivoire);margin-bottom:7px;font-weight:600}

.fab{
  position:fixed;right:18px;bottom:calc(88px + var(--safe-b));z-index:25;
  width:54px;height:54px;border-radius:50%;background:var(--beurre);color:#2A1D07;
  font-size:29px;line-height:1;display:grid;place-items:center;
  box-shadow:0 6px 22px rgba(0,0,0,.5);font-family:"Bricolage Grotesque";font-weight:600;
}
.btn{background:var(--beurre);color:#2A1D07;border-radius:10px;padding:11px 16px;font-weight:600;text-align:center}
.btn.ghost{background:transparent;border:1px solid var(--bord);color:var(--ivoire)}
.btn.danger{background:transparent;border:1px solid var(--rose);color:var(--rose)}

.sheet{position:fixed;inset:0;z-index:50;background:rgba(12,8,17,.78);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
.sheet > div{position:relative;background:var(--nuit-2);border:1px solid var(--bord);border-bottom:none;border-radius:20px 20px 0 0;width:100%;max-width:720px;max-height:88vh;overflow-y:auto;padding:20px 20px calc(28px + var(--safe-b))}
.fermer-x{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:var(--nuit-3);border:1px solid var(--bord);color:var(--ivoire);font-size:19px;line-height:1;display:grid;place-items:center;z-index:5}
.attente{opacity:.58}
.poignee{width:38px;height:4px;background:var(--bord);border-radius:99px;margin:0 auto 16px}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(94px + var(--safe-b));z-index:60;background:var(--ivoire);color:var(--nuit);padding:10px 16px;border-radius:99px;font-size:13.5px;font-weight:600;box-shadow:0 6px 22px rgba(0,0,0,.4)}
.spin{width:17px;height:17px;border:2px solid var(--bord);border-top-color:var(--beurre);border-radius:50%;animation:s .7s linear infinite;display:inline-block}
@keyframes s{to{transform:rotate(360deg)}}
.err{color:var(--rose);font-size:13.5px}
</style>
</head>
<body>

<header>
  <div>
    <div class="eyebrow" id="eyebrow">Suivi</div>
    <h1 id="titre">Séries</h1>
  </div>
  <div class="mono" id="compteur" style="font-size:12px;color:var(--brume)"></div>
</header>

<main id="vue"></main>
<button class="fab" id="fab" aria-label="Ajouter">+</button>

<nav id="nav"></nav>

<script>
"use strict";

/* ============ état ============ */
const CLE = "suivi:v1";
let D = { series: [], films: [], tmdb: "" };
let page = "series";
let histOnglet = "series";
let histSerieOuv = new Set();   // séries dépliées dans l'historique
let histSaisonOuv = new Set();  // saisons dépliées, clé "idSerie:n"
let histFilmTri = "vu";  // "vu" ou "sortie"
let decOnglet = "sorties";
let decFiltre = "tout";   // tout | series | films
let decQ = "";           // recherche en cours dans Découverte
let decTimer;
let decCache = { sorties:null, pourtoi:null };
let ouvert = null;

function charger(){
  try{ const b = localStorage.getItem(CLE); if(b) D = Object.assign(D, JSON.parse(b)); }
  catch(e){ console.warn("Lecture impossible", e); }
}
function sauver(){
  try{ localStorage.setItem(CLE, JSON.stringify(D)); }
  catch(e){ toast("Sauvegarde impossible — stockage plein ?"); }
}
// la liste a changé : les suggestions doivent être recalculées
function invaliderSuggestions(){ decCache.pourtoi = null; }
const uid = () => Math.random().toString(36).slice(2,10);
const img = p => p ? "https://image.tmdb.org/t/p/w185"+p : null;
const init = t => t.replace(/[^A-Za-zÀ-ÿ0-9 ]/g,"").split(/\s+/).filter(Boolean).slice(0,2).map(m=>m[0].toUpperCase()).join("");
const esc = s => String(s??"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const dateFr = iso => new Date(iso).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});

/* ============ logique séries ============ */
const cle = (s,e) => s+"x"+e;
function totalEp(s){ return s.saisons.reduce((a,x)=>a+x.episodes.length,0); }
function nbVus(s){ return Object.keys(s.vus||{}).length; }
function fini(s){ const t=totalEp(s); return t>0 && nbVus(s)>=t; }
function suivant(s){
  for(const sa of s.saisons)
    for(const ep of sa.episodes)
      if(!s.vus[cle(sa.n,ep.n)]) return {saison:sa.n, ...ep};
  return null;
}
// date la plus récente d'un visionnage de la série, ou date d'ajout si rien de vu
function derniereActivite(s){
  let max = s.ajoute || "";
  for(const d of Object.values(s.vus||{})) if(d > max) max = d;
  return max;
}
// un épisode dont la date de diffusion est dans le futur. On tolère un jour de battement
// pour couvrir les décalages horaires France/US.
function epFutur(ep){
  if(!ep?.date) return false;
  const sortie = new Date(ep.date+"T00:00");
  return sortie.getTime() > Date.now() + 24*3600*1000;
}
function dateEp(iso){
  return new Date(iso+"T00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});
}
function marquer(s, sn, en, val){
  const k = cle(sn,en);
  if(val) s.vus[k] = new Date().toISOString();
  else delete s.vus[k];
  sauver();
}

/* ============ TMDB ============ */
const aCle = () => !!(D.tmdb && D.tmdb.trim());
async function tmdb(chemin, params={}){
  const u = new URL("https://api.themoviedb.org/3"+chemin);
  u.searchParams.set("api_key", D.tmdb.trim());
  u.searchParams.set("language","en-US");
  for(const [k,v] of Object.entries(params)) u.searchParams.set(k,v);
  const r = await fetch(u);
  if(r.status===401) throw new Error("Clé TMDB refusée. Vérifie-la dans Réglages.");
  if(!r.ok) throw new Error("TMDB n'a pas répondu (erreur "+r.status+").");
  return r.json();
}
async function chercher(q, type){
  const d = await tmdb("/search/"+(type==="series"?"tv":"movie"), {query:q, include_adult:"false"});
  return (d.results||[]).slice(0,8).map(r=>({
    tmdbId:r.id,
    titre:r.name||r.title,
    annee:(r.first_air_date||r.release_date||"").slice(0,4),
    poster:r.poster_path,
  }));
}
async function importerSerie(id){
  const d = await tmdb("/tv/"+id);
  const utiles = (d.seasons||[]).filter(s=>s.season_number>0 && s.episode_count>0);
  const saisons = await Promise.all(utiles.map(async s=>{
    try{
      const sd = await tmdb("/tv/"+id+"/season/"+s.season_number);
      return { n:s.season_number, episodes:(sd.episodes||[]).map(e=>({n:e.episode_number, titre:e.name||"", duree:e.runtime||null, date:e.air_date||null})) };
    }catch(e){
      return { n:s.season_number, episodes:Array.from({length:s.episode_count},(_,i)=>({n:i+1, titre:"", duree:null, date:null})) };
    }
  }));
  return { id:uid(), tmdbId:id, titre:d.name, annee:(d.first_air_date||"").slice(0,4), poster:d.poster_path, saisons:saisons.sort((a,b)=>a.n-b.n), vus:{}, ajoute:new Date().toISOString() };
}
async function importerFilm(id){
  const d = await tmdb("/movie/"+id);
  return { id:uid(), tmdbId:id, titre:d.title, annee:(d.release_date||"").slice(0,4), poster:d.poster_path, duree:d.runtime||null, vuLe:null, ajoute:new Date().toISOString() };
}

/* ============ découverte ============ */
const dansMaListe = (id,type) => type==="series" ? D.series.some(s=>s.tmdbId===id) : D.films.some(f=>f.tmdbId===id);
const versTuile = (r,type) => ({
  tmdbId:r.id, type,
  titre:r.name||r.title,
  annee:(r.first_air_date||r.release_date||"").slice(0,4),
  poster:r.poster_path,
  note:r.vote_average||0,
  votes:r.vote_count||0,
});

async function chercherTuiles(q){
  const [s,f] = await Promise.all([
    tmdb("/search/tv",   {query:q, include_adult:"false"}).catch(()=>({results:[]})),
    tmdb("/search/movie",{query:q, include_adult:"false"}).catch(()=>({results:[]})),
  ]);
  return {
    series:(s.results||[]).map(r=>versTuile(r,"series")).filter(x=>x.titre),
    films: (f.results||[]).map(r=>versTuile(r,"films")).filter(x=>x.titre),
  };
}

async function sorties(){
  const paquets = { series:[], films:[] };
  const deja = new Set();
  // on pagine jusqu'à avoir de quoi remplir la grille une fois retiré ce qu'elle suit déjà
  for(let p=1; p<=3; p++){
    const [f,s] = await Promise.all([
      tmdb("/movie/now_playing",{page:String(p)}).catch(()=>({results:[]})),
      tmdb("/tv/on_the_air",{page:String(p)}).catch(()=>({results:[]})),
    ]);
    for(const [d,type] of [[s,"series"],[f,"films"]]){
      for(const r of (d.results||[])){
        const t = versTuile(r,type);
        const k = type+":"+t.tmdbId;
        if(deja.has(k)) continue;
        deja.add(k);
        if(dansMaListe(t.tmdbId,type)) continue;   // déjà dans sa liste : la place va à un autre
        paquets[type].push(t);
      }
    }
    if(paquets.series.length>=26 && paquets.films.length>=26) break;
    if(!(f.results||[]).length && !(s.results||[]).length) break;
  }
  return paquets;
}

async function pourToi(){
  const sources = [
    ...D.series.filter(s=>s.tmdbId).map(s=>({id:s.tmdbId, type:"series", titre:s.titre, poids:nbVus(s)>0?2:1})),
    ...D.films.filter(f=>f.tmdbId).map(f=>({id:f.tmdbId, type:"films", titre:f.titre, poids:f.vuLe?2:1})),
  ];
  if(!sources.length) return { vide:true, items:[] };
  // les titres les plus engagés d'abord, puis on plafonne pour rester rapide
  const choix = sources.sort((a,b)=>b.poids-a.poids).slice(0,8);
  const lots = await Promise.all(choix.map(async src=>{
    try{
      const d = await tmdb("/"+(src.type==="series"?"tv":"movie")+"/"+src.id+"/recommendations");
      return (d.results||[]).slice(0,12).map(r=>({ t:versTuile(r,src.type), pq:src.titre, poids:src.poids }));
    }catch(e){ return []; }
  }));
  const tally = new Map();
  for(const lot of lots) for(const {t,pq,poids} of lot){
    if(dansMaListe(t.tmdbId,t.type)) continue;
    if(t.votes < 40) continue; // écarte les titres trop peu notés
    const k = t.type+":"+t.tmdbId;
    const e = tally.get(k) || { ...t, score:0, raisons:[] };
    e.score += poids;
    if(!e.raisons.includes(pq)) e.raisons.push(pq);
    tally.set(k,e);
  }
  const items = [...tally.values()].sort((a,b)=> b.score-a.score || b.note-a.note).slice(0,24);
  return { vide:false, items };
}

/* ============ rendu ============ */
const $ = s => document.querySelector(s);
function rendre(){
  // remplacer le contenu remet la page en haut : on repose le lecteur où il était.
  // Changer d'onglet remonte volontairement, via window.scrollTo dans le gestionnaire.
  const sy = window.scrollY;
  const meta = {
    series:  ["Suivi", "Séries",     D.series.filter(s=>!fini(s)).length + " en cours"],
    films:   ["Suivi", "Films",      D.films.filter(f=>!f.vuLe).length + " à voir"],
    decouv:  ["Suivi", "Découverte", ""],
    hist:    ["Suivi", "Historique", ""],
    reglages:["Suivi", "Réglages",   ""],
  }[page];
  $("#eyebrow").textContent = meta[0];
  $("#titre").textContent = meta[1];
  $("#compteur").textContent = meta[2];
  $("#fab").style.display = (page==="series"||page==="films") ? "grid" : "none";
  $("#vue").innerHTML = { series:vueSeries, films:vueFilms, decouv:vueDecouv, hist:vueHist, reglages:vueReglages }[page]();
  rendreNav();
  window.scrollTo(0, sy);
  if(page==="decouv") chargerDecouv();
}
function rendreNav(){
  const items = [
    ["series","Séries",'<path d="M3 7h18v13H3z"/><path d="m8 3 4 4 4-4"/>'],
    ["films","Films",'<path d="M3 4h18v16H3z"/><path d="M7 4v16M17 4v16M3 12h18"/>'],
    ["decouv","Découverte",'<circle cx="12" cy="12" r="9"/><path d="m15.2 8.8-2.1 4.4-4.3 2.1 2.1-4.4z"/>'],
    ["hist","Historique",'<path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/>'],
    ["reglages","Réglages",'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2 2 2 0 1 1-4 0 1.7 1.7 0 0 0-2.9-1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 3 15a2 2 0 1 1 0-4 1.7 1.7 0 0 0 1.2-2.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.7 1.7 0 0 0 10 4.6a2 2 0 1 1 4 0 1.7 1.7 0 0 0 2.9 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.7 1.7 0 0 0 21 11a2 2 0 1 1 0 4z"/>'],
  ];
  $("#nav").innerHTML = items.map(([id,lab,path])=>
    `<button class="${page===id?"on":""}" data-page="${id}"><svg viewBox="0 0 24 24">${path}</svg>${lab}</button>`
  ).join("");
}

/* ---- page Séries : uniquement l'épisode suivant ---- */
function vueSeries(){
  const actives = D.series.filter(s=>!fini(s))
    .sort((a,b)=> derniereActivite(b).localeCompare(derniereActivite(a)));
  if(!actives.length) return vide("Aucune série en cours","Ajoute une série avec le bouton +. L'épisode suivant s'affichera ici, prêt à cocher.");
  return actives.map(s=>{
    const ep = suivant(s), t = totalEp(s), v = nbVus(s);
    const p = t ? Math.round(v/t*100) : 0;
    const code = "S"+String(ep.saison).padStart(2,"0")+"E"+String(ep.n).padStart(2,"0");
    const futur = epFutur(ep);
    return `<div class="card ${futur?"attente":""}" style="margin-bottom:12px;padding:14px">
      <div class="row">
        <div class="poster wide" data-ffiche="series:${s.id}" style="${s.poster?`background-image:url(${img(s.poster)})`:""}">${s.poster?"":esc(init(s.titre))}</div>
        <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:7px">
          <div data-ffiche="series:${s.id}" style="min-width:0">
            <div style="font-weight:600;font-size:16.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.titre)}</div>
            <div class="mono" style="font-size:12.5px;color:var(--beurre);margin-top:3px">${code}</div>
            <div style="font-size:13.5px;color:var(--brume);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ep.titre||"Épisode "+ep.n)}</div>
          </div>
          <div class="bar" style="margin-top:auto"><i style="width:${p}%"></i></div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="mono" style="font-size:11px;color:var(--brume);flex:1">${v}/${t}</span>
            ${futur
              ? `<span class="pill" style="border-color:var(--bord);color:var(--brume)">Sortie ${dateEp(ep.date)}</span>`
              : `<button class="btn" style="padding:7px 14px;font-size:13.5px" data-vu="${s.id}">Vu</button>`}
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

/* ---- page Films ---- */
function vueFilms(){
  const a = D.films.filter(f=>!f.vuLe)
    .sort((a,b)=> (b.annee||"0").localeCompare(a.annee||"0") || a.titre.localeCompare(b.titre));
  if(!a.length) return vide("Aucun film à voir","Ajoute un film avec le bouton +. Une fois vu, il part dans l'historique.");
  return `<div class="cartes trois">${a.map(f=>`
    <div class="tuile" data-ffiche="films:${f.id}">
      <div class="aff" style="${f.poster?`background-image:url(${img(f.poster)})`:""}">
        ${f.poster?"":esc(init(f.titre))}
        <button class="coche" data-filmvu="${f.id}" aria-label="Marquer ${esc(f.titre)} comme vu">
          <svg viewBox="0 0 24 24"><path d="M4 12.5 9.5 18 20 6.5"/></svg>
        </button>
      </div>
      <div>
        <div class="nom">${esc(f.titre)}</div>
        <div class="pq">${f.annee||"—"}${f.duree?" · "+f.duree+" min":""}</div>
      </div>
    </div>`).join("")}</div>`;
}

// Fiche descriptive : synopsis, acteurs, bande-annonce.
// Ouverte au clic sur un poster/affiche depuis Séries, Films, Historique et Découverte.
// tmdbId peut manquer (saisie manuelle) : on affiche alors juste ce qu'on a.
async function ficheDescription(type, tmdbId, localId){
  const item = localId ? (type==="series"?D.series:D.films).find(x=>x.id===localId) : null;
  // Squelette immédiat + poignée : la feuille s'ouvre sans attendre le réseau
  feuille(`<div class="poignee"></div>
    <div id="fiche"><div style="padding:40px;text-align:center"><span class="spin"></span></div></div>`,
    async el=>{
      const box = el.querySelector("#fiche");
      let d = null, cast = [], trailer = null;
      if(tmdbId && aCle()){
        try{
          d = await tmdb("/"+(type==="series"?"tv":"movie")+"/"+tmdbId, {append_to_response:"credits,videos"});
          cast = (d.credits?.cast||[]).slice(0,6).map(c=>c.name);
          const vids = d.videos?.results||[];
          trailer = vids.find(v=>v.type==="Trailer" && v.site==="YouTube" && v.official)
                 || vids.find(v=>v.type==="Trailer" && v.site==="YouTube")
                 || vids.find(v=>v.site==="YouTube");
        }catch(e){ /* pas grave : on affiche ce qu'on sait déjà */ }
      }
      // fallback sur les données stockées
      const titre = d?.title || d?.name || item?.titre || "";
      const annee = (d?.release_date||d?.first_air_date||"").slice(0,4) || item?.annee || "";
      const poster = d?.poster_path || item?.poster;
      const duree = d?.runtime || d?.episode_run_time?.[0] || item?.duree;
      const note = d?.vote_average;
      const overview = d?.overview || "";
      const trailerUrl = trailer ? "https://www.youtube.com/watch?v="+trailer.key : null;

      // Actions selon contexte : dans la liste ou pas, série ou film
      let actions = "";
      if(item && type==="series"){
        actions = `<button class="btn" style="width:100%;margin-bottom:9px" data-detail="${item.id}">Voir les épisodes</button>
                   <button class="btn danger" style="width:100%" data-supprimer="${item.id}">Retirer de ma liste</button>`;
      } else if(item && type==="films"){
        actions = item.vuLe
          ? `<button class="btn ghost" style="width:100%;margin-bottom:9px" data-filmrevu="${item.id}">Remettre à voir</button>
             <button class="btn danger" style="width:100%" data-filmsup="${item.id}">Retirer</button>`
          : `<button class="btn" style="width:100%;margin-bottom:9px" data-filmvu="${item.id}">Marquer comme vu</button>
             <button class="btn danger" style="width:100%" data-filmsup="${item.id}">Retirer de ma liste</button>`;
      } else if(tmdbId){
        actions = `<button class="btn" style="width:100%" data-decadd="${type}:${tmdbId}">Ajouter à ma liste</button>`;
      }

      box.innerHTML = `
        <div class="row" style="margin-bottom:16px">
          <div class="poster wide" style="${poster?`background-image:url(${img(poster)})`:""};min-height:130px">${poster?"":esc(init(titre))}</div>
          <div style="flex:1;min-width:0">
            <h2 style="font-size:21px">${esc(titre)}</h2>
            <div class="mono" style="font-size:12px;color:var(--brume);margin-top:6px">
              ${annee||"—"}${duree?" · "+duree+" min":""}${note?" · ★ "+note.toFixed(1):""}
            </div>
            ${d && type==="series" && d.number_of_seasons ? `<div class="mono" style="font-size:11.5px;color:var(--brume);margin-top:3px">${d.number_of_seasons} saison${d.number_of_seasons>1?"s":""} · ${d.number_of_episodes} épisodes</div>` : ""}
          </div>
        </div>
        ${overview ? `<p style="font-size:14px;line-height:1.55;margin-bottom:16px">${esc(overview)}</p>` : ""}
        ${cast.length ? `<div style="margin-bottom:16px">
          <div class="eyebrow" style="margin-bottom:5px">Avec</div>
          <div style="font-size:13.5px;color:var(--brume)">${cast.map(esc).join(" · ")}</div>
        </div>` : ""}
        ${trailerUrl ? `<a href="${trailerUrl}" target="_blank" rel="noopener" class="btn ghost" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;margin-bottom:9px">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Bande-annonce
        </a>` : ""}
        ${actions}
        ${!overview && !cast.length && !trailerUrl && !aCle() ? `<p style="font-size:13px;color:var(--brume);text-align:center;padding:20px 0">Ajoute une clé TMDB dans Réglages pour voir le synopsis, les acteurs et la bande-annonce.</p>` : ""}
      `;
    });
}

/* ---- page Découverte ---- */
function vueDecouv(){
  if(!aCle()) return vide("Découverte a besoin d'une clé TMDB","Les sorties et les suggestions viennent de TMDB. Ajoute une clé dans Réglages — c'est gratuit et ça prend cinq minutes.");
  const chips = [["tout","Tout"],["series","Séries"],["films","Films"]];
  return `<div style="position:relative;margin-bottom:11px">
    <input id="decq" placeholder="Chercher un film ou une série" value="${esc(decQ)}" autocomplete="off" style="padding-right:40px">
    <button id="decx" aria-label="Effacer la recherche" style="display:${decQ?"block":"none"};position:absolute;right:4px;top:0;bottom:0;width:36px;color:var(--brume);font-size:20px">×</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:11px">
    <button class="btn ${decOnglet==="sorties"&&!decQ?"":"ghost"}" style="flex:1;padding:9px" data-dec="sorties">Sorties</button>
    <button class="btn ${decOnglet==="pourtoi"&&!decQ?"":"ghost"}" style="flex:1;padding:9px" data-dec="pourtoi">Pour toi</button>
  </div>
  <div style="display:flex;gap:7px;margin-bottom:17px">
    ${chips.map(([id,lab])=>`<button class="chip ${decFiltre===id?"on":""}" data-decf="${id}">${lab}</button>`).join("")}
  </div>
  <div id="decRes"></div>`;
}

// le filtre trie ce qui est déjà en cache : changer de filtre ne relance aucun appel
function filtrer(d, ong){
  if(ong==="pourtoi") return d.items.filter(x=>decFiltre==="tout"||x.type===decFiltre).slice(0,24);
  if(decFiltre==="series") return d.series.slice(0,24);
  if(decFiltre==="films")  return d.films.slice(0,24);
  const out=[], n=Math.max(d.series.length, d.films.length);
  for(let i=0;i<n;i++){ if(d.series[i]) out.push(d.series[i]); if(d.films[i]) out.push(d.films[i]); }
  return out.slice(0,24);
}

async function chargerDecouv(){
  const box = $("#decRes"); if(!box) return;

  // le champ est rebranché à chaque rendu ; taper ne redessine pas la page,
  // sinon on perdrait le focus à chaque lettre.
  const inp = $("#decq"), croix = $("#decx");
  if(inp){
    inp.oninput = ()=>{
      decQ = inp.value.trim();
      croix.style.display = decQ ? "block" : "none";   // pas de rendre() : le focus resterait dans le vide
      clearTimeout(decTimer);
      decTimer = setTimeout(chargerDecouv, 400);
    };
  }
  if(croix) croix.onclick = ()=>{ decQ=""; clearTimeout(decTimer); rendre(); };

  if(decQ){
    const q = decQ;
    box.innerHTML = '<div style="padding:40px;text-align:center"><span class="spin"></span></div>';
    try{
      const d = await chercherTuiles(q);
      if(page==="decouv" && decQ===q) peindreDecouv(d, "recherche");
    }catch(e){ box.innerHTML = `<p class="err" style="padding:10px 0">${esc(e.message)}</p>`; }
    return;
  }

  const ong = decOnglet;
  if(decCache[ong]){ peindreDecouv(decCache[ong], ong); return; }
  box.innerHTML = '<div style="padding:40px;text-align:center"><span class="spin"></span></div>';
  try{
    const d = ong==="sorties" ? await sorties() : await pourToi();
    decCache[ong] = d;
    if(page==="decouv" && decOnglet===ong && !decQ) peindreDecouv(d, ong);
  }catch(e){
    box.innerHTML = `<p class="err" style="padding:10px 0">${esc(e.message)}</p>
      <button class="btn ghost" style="width:100%;margin-top:8px" data-decretry="1">Réessayer</button>`;
  }
}

function peindreDecouv(d, ong){
  const box = $("#decRes"); if(!box) return;
  if(ong==="pourtoi" && d.vide)
    return box.innerHTML = vide("Rien à suggérer pour l'instant","Les suggestions se construisent à partir de ta liste. Ajoute deux ou trois séries ou films trouvés via la recherche, puis reviens.");

  const items = filtrer(d, ong);
  if(!items.length){
    const quoi = decFiltre==="series" ? "série" : decFiltre==="films" ? "film" : "titre";
    if(ong==="recherche")
      return box.innerHTML = vide("Aucun "+quoi+" pour « "+esc(decQ)+" »","Vérifie l'orthographe, ou essaie le titre original.");
    return box.innerHTML = vide("Aucun "+quoi+" ici",
      decFiltre==="tout" ? "TMDB n'a rien renvoyé. Réessaie plus tard."
                         : "Change de filtre, ou reviens plus tard — tout ce qui sortait est peut-être déjà dans ta liste.");
  }

  const intro = ong==="recherche"
    ? "Résultats pour « "+esc(decQ)+" ». Le + ajoute directement à ta liste."
    : ong==="sorties"
    ? "Films au cinéma et séries diffusées en ce moment. Ce que tu suis déjà est écarté."
    : "Construit à partir des titres de ta liste. Ce que tu as déjà commencé ou vu pèse le double.";

  box.innerHTML = `<p style="font-size:13px;color:var(--brume);margin-bottom:14px">${intro}</p>
  <div class="cartes">${items.map(x=>{
    const dedans = dansMaListe(x.tmdbId, x.type);
    const pq = ong==="pourtoi" && x.raisons?.length
      ? "d'après "+esc(x.raisons[0])+(x.raisons.length>1?" +"+(x.raisons.length-1):"")
      : (x.annee||"—")+(x.note?" · "+x.note.toFixed(1):"");
    return `<button class="tuile ${dedans?"dedans":""}" data-decadd="${x.type}:${x.tmdbId}" ${dedans?"disabled":""}>
      <div class="aff" style="${x.poster?`background-image:url(${img(x.poster)})`:""}">
        ${x.poster?"":esc(init(x.titre))}
        <span class="marque">${x.type==="series"?"SÉRIE":"FILM"}</span>
        ${dedans?"":'<span class="plus">+</span>'}
      </div>
      <div style="min-width:0">
        <div class="nom">${esc(x.titre)}</div>
        <div class="pq">${dedans?"déjà dans ta liste":pq}</div>
      </div>
    </button>`;
  }).join("")}</div>`;
}

/* ---- page Historique ---- */
function vueHist(){
  const ong = `<div style="display:flex;gap:8px;margin-bottom:18px">
    <button class="btn ${histOnglet==="series"?"":"ghost"}" style="flex:1;padding:9px" data-ong="series">Séries</button>
    <button class="btn ${histOnglet==="films"?"":"ghost"}" style="flex:1;padding:9px" data-ong="films">Films</button>
  </div>`;
  return ong + (histOnglet==="series" ? histSeries() : histFilms());
}
function histSeries(){
  const avec = D.series.filter(s=>nbVus(s)>0);
  if(!avec.length) return vide("Rien de coché pour l'instant","Les épisodes que tu marques comme vus apparaîtront ici, saison par saison.");
  return avec.map(s=>{
    const dep = histSerieOuv.has(s.id);
    const saisonsVues = s.saisons.filter(sa=>sa.episodes.some(e=>s.vus[cle(sa.n,e.n)]));
    return `<div class="card" style="margin-bottom:10px">
      <button class="ligne" data-hs="${s.id}" aria-expanded="${dep}">
        ${chev(dep)}
        <span class="poster" data-ffiche="series:${s.id}" style="${s.poster?`background-image:url(${img(s.poster)})`:""};width:38px;flex:0 0 38px;min-height:54px;font-size:12px">${s.poster?"":esc(init(s.titre))}</span>
        <span style="flex:1;min-width:0;text-align:left">
          <span style="font-weight:600;font-size:15.5px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.titre)}</span>
          <span class="mono" style="font-size:11px;color:var(--brume)">${nbVus(s)}/${totalEp(s)} épisodes · ${saisonsVues.length} saison${saisonsVues.length>1?"s":""}</span>
        </span>
        ${fini(s)?'<span class="pill" style="color:var(--beurre);border-color:var(--beurre);flex:0 0 auto">Terminée</span>':""}
      </button>
      ${dep ? `<div style="padding:0 14px 12px">
        ${saisonsVues.map(sa=>{
          const k = s.id+":"+sa.n;
          const so = histSaisonOuv.has(k);
          const vus = sa.episodes.filter(e=>s.vus[cle(sa.n,e.n)]);
          return `<button class="ligne sous" data-hsa="${k}" aria-expanded="${so}">
            ${chev(so, 13)}
            <span class="mono" style="flex:1;text-align:left;font-size:13px;font-weight:600;color:var(--beurre)">Saison ${sa.n}</span>
            <span class="mono" style="font-size:11px;color:var(--brume)">${vus.length}/${sa.episodes.length}</span>
          </button>
          ${so ? `<div style="padding:2px 0 8px 22px">
            ${vus.map(e=>`<div style="display:flex;gap:9px;padding:5px 0;font-size:13px;align-items:baseline">
              <span class="mono" style="color:var(--brume);flex:0 0 30px">E${String(e.n).padStart(2,"0")}</span>
              <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.titre||"Épisode "+e.n)}</span>
              <span class="mono" style="color:var(--brume);font-size:10.5px;flex:0 0 auto">${dateFr(s.vus[cle(sa.n,e.n)])}</span>
            </div>`).join("")}
          </div>` : ""}`;
        }).join("")}
        <button class="btn ghost" style="width:100%;margin-top:8px;padding:8px;font-size:13px" data-detail="${s.id}">Modifier les épisodes</button>
      </div>` : ""}
    </div>`;
  }).join("");
}
function chev(ouvert, t=16){
  return `<svg class="chev ${ouvert?"on":""}" style="width:${t}px;height:${t}px;flex:0 0 ${t}px" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></svg>`;
}
function histFilms(){
  const vus = D.films.filter(f=>f.vuLe);
  if(!vus.length) return vide("Aucun film vu","Marque un film comme vu depuis l'onglet Films.");
  vus.sort((a,b)=> histFilmTri==="vu"
    ? b.vuLe.localeCompare(a.vuLe)
    : (b.annee||"0").localeCompare(a.annee||"0") || a.titre.localeCompare(b.titre));
  const h = vus.reduce((a,f)=>a+(f.duree||0),0);
  return `<div style="display:flex;gap:7px;margin-bottom:14px">
    <button class="chip ${histFilmTri==='vu'?'on':''}" data-htf="vu">Vu récemment</button>
    <button class="chip ${histFilmTri==='sortie'?'on':''}" data-htf="sortie">Date de sortie</button>
  </div>
  <div class="mono" style="font-size:12px;color:var(--brume);margin-bottom:14px">${vus.length} film${vus.length>1?"s":""}${h?" · "+Math.round(h/60)+" h":""}</div>
  <div class="cartes trois">${vus.map(f=>`
    <div class="tuile" data-ffiche="films:${f.id}">
      <div class="aff" style="${f.poster?`background-image:url(${img(f.poster)})`:""}">${f.poster?"":esc(init(f.titre))}</div>
      <div>
        <div class="nom">${esc(f.titre)}</div>
        <div class="pq">${histFilmTri==='vu' ? "Vu "+dateFr(f.vuLe) : (f.annee||"—")}</div>
      </div>
    </div>`).join("")}</div>`;
}

function vide(t,s){ return `<div class="vide"><h3>${t}</h3><p style="font-size:14px">${s}</p></div>`; }

/* ============ feuille : détail d'une série ============ */
function detail(id, scroll=0){
  const s = D.series.find(x=>x.id===id); if(!s) return;
  const ep = suivant(s), t=totalEp(s), v=nbVus(s);
  const corps = `
    <div class="poignee"></div>
    <div class="row" style="margin-bottom:18px">
      <div class="poster wide" style="${s.poster?`background-image:url(${img(s.poster)})`:""};min-height:112px">${s.poster?"":esc(init(s.titre))}</div>
      <div style="flex:1;min-width:0">
        <h2 style="font-size:22px">${esc(s.titre)}</h2>
        <div class="mono" style="font-size:12px;color:var(--brume);margin:5px 0 9px">${s.annee||"—"} · ${s.saisons.length} saison${s.saisons.length>1?"s":""} · ${v}/${t} vus</div>
        ${fini(s)?'<span class="pill" style="color:var(--beurre);border-color:var(--beurre)">Terminée</span>':(ep?`<div style="font-size:13.5px;color:var(--brume)">Suivant : <span class="mono" style="color:var(--beurre)">S${String(ep.saison).padStart(2,"0")}E${String(ep.n).padStart(2,"0")}</span></div>`:"")}
      </div>
    </div>
    <p style="font-size:13px;color:var(--brume);margin-bottom:14px">Tape une case pour cocher ou décocher un épisode.</p>
    ${s.saisons.map(sa=>{
      const vs = sa.episodes.filter(e=>s.vus[cle(sa.n,e.n)]).length;
      return `<div style="margin-bottom:18px">
        <div style="display:flex;align-items:baseline;gap:9px;margin-bottom:9px">
          <span class="mono" style="font-size:12.5px;font-weight:600">Saison ${sa.n}</span>
          <span style="flex:1;height:1px;background:var(--bord)"></span>
          <span class="mono" style="font-size:11px;color:${vs===sa.episodes.length?"var(--beurre)":"var(--brume)"}">${vs}/${sa.episodes.length}</span>
          <button class="mono" style="font-size:11px;color:var(--brume)" data-saison="${sa.n}">${vs===sa.episodes.length?"Tout décocher":"Tout cocher"}</button>
        </div>
        <div class="grid">${sa.episodes.map(e=>{
          const on = !!s.vus[cle(sa.n,e.n)];
          const nx = ep && ep.saison===sa.n && ep.n===e.n;
          return `<button class="ep ${on?"vu":""} ${nx?"suivant":""}" data-ep="${sa.n},${e.n}" title="${esc(e.titre||"")}" aria-pressed="${on}">${e.n}</button>`;
        }).join("")}</div>
      </div>`;
    }).join("")}
    <button class="btn danger" style="width:100%;margin-top:6px" data-supprimer="${s.id}">Retirer cette série</button>`;
  feuille(corps, el=>{
    const boite = el.firstElementChild;
    boite.scrollTop = scroll;
    const rejouer = () => { const y = boite.scrollTop; fermer(); detail(id, y); rendre(); };
    el.querySelectorAll("[data-ep]").forEach(b=>b.onclick=()=>{
      const [sn,en] = b.dataset.ep.split(",").map(Number);
      marquer(s, sn, en, !s.vus[cle(sn,en)]);
      rejouer();
    });
    el.querySelectorAll("[data-saison]").forEach(b=>b.onclick=()=>{
      const sn = Number(b.dataset.saison);
      const sa = s.saisons.find(x=>x.n===sn);
      const tout = sa.episodes.every(e=>s.vus[cle(sn,e.n)]);
      sa.episodes.forEach(e=>marquer(s, sn, e.n, !tout));
      rejouer();
    });
    el.querySelector("[data-supprimer]").onclick=()=>{
      if(!confirm("Retirer « "+s.titre+" » et son historique ?")) return;
      D.series = D.series.filter(x=>x.id!==id); sauver(); invaliderSuggestions(); fermer(); rendre(); toast("Série retirée");
    };
  });
}

/* ============ feuille : ajouter ============ */
function ajouter(){
  const type = page==="films" ? "films" : "series";
  const nom = type==="films" ? "un film" : "une série";
  if(!aCle()) return manuel(type);
  feuille(`
    <div class="poignee"></div>
    <h2 style="font-size:21px;margin-bottom:13px">Ajouter ${nom}</h2>
    <input id="q" placeholder="Titre à chercher" autocomplete="off">
    <div id="res" style="margin-top:14px"></div>
    <button class="btn ghost" style="width:100%;margin-top:14px" id="allerManuel">Saisir à la main</button>
  `, el=>{
    const q = el.querySelector("#q"), res = el.querySelector("#res");
    q.focus();
    let timer;
    q.oninput = ()=>{
      clearTimeout(timer);
      const v = q.value.trim();
      if(v.length<2){ res.innerHTML=""; return; }
      res.innerHTML = '<div style="padding:14px;text-align:center"><span class="spin"></span></div>';
      timer = setTimeout(async()=>{
        try{
          const r = await chercher(v, type);
          if(!r.length){ res.innerHTML = '<p style="color:var(--brume);font-size:13.5px;padding:8px 0">Rien trouvé. Vérifie l\'orthographe ou saisis à la main.</p>'; return; }
          res.innerHTML = r.map(x=>`<button data-add="${x.tmdbId}" style="display:flex;gap:12px;align-items:center;width:100%;text-align:left;padding:9px 0;border-bottom:1px solid var(--bord)">
            <div class="poster" style="${x.poster?`background-image:url(${img(x.poster)})`:""};width:40px;flex-basis:40px;min-height:58px;font-size:13px">${x.poster?"":esc(init(x.titre))}</div>
            <div style="flex:1;min-width:0"><div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(x.titre)}</div><div class="mono" style="font-size:11.5px;color:var(--brume)">${x.annee||"—"}</div></div>
            <span style="color:var(--beurre);font-size:21px">+</span>
          </button>`).join("");
          res.querySelectorAll("[data-add]").forEach(b=>b.onclick=async()=>{
            b.style.opacity=.4; b.disabled=true;
            try{
              const id = Number(b.dataset.add);
              if(type==="series"){
                if(D.series.some(s=>s.tmdbId===id)) throw new Error("Cette série est déjà dans ta liste.");
                D.series.push(await importerSerie(id));
              }else{
                if(D.films.some(f=>f.tmdbId===id)) throw new Error("Ce film est déjà dans ta liste.");
                D.films.push(await importerFilm(id));
              }
              sauver(); invaliderSuggestions(); fermer(); rendre(); toast("Ajouté");
            }catch(e){ b.style.opacity=1; b.disabled=false; res.insertAdjacentHTML("afterbegin",`<p class="err" style="padding-bottom:8px">${esc(e.message)}</p>`); }
          });
        }catch(e){ res.innerHTML = `<p class="err">${esc(e.message)}</p>`; }
      }, 380);
    };
    el.querySelector("#allerManuel").onclick = ()=>{ fermer(); manuel(type); };
  });
}

function manuel(type){
  const serie = type==="series";
  feuille(`
    <div class="poignee"></div>
    <h2 style="font-size:21px;margin-bottom:5px">${serie?"Nouvelle série":"Nouveau film"}</h2>
    <p style="font-size:13px;color:var(--brume);margin-bottom:14px">${aCle()?"Saisie manuelle.":"Sans clé TMDB, la saisie est manuelle. Tu peux en ajouter une dans Réglages."}</p>
    <label class="eyebrow">Titre</label>
    <input id="mt" placeholder="${serie?"Le Bureau des légendes":"Dune"}" style="margin:6px 0 12px">
    <label class="eyebrow">Année</label>
    <input id="ma" inputmode="numeric" placeholder="2015" style="margin:6px 0 12px">
    ${serie?`<label class="eyebrow">Épisodes par saison</label>
    <input id="ms" inputmode="numeric" placeholder="10, 10, 12" style="margin:6px 0 6px">
    <p style="font-size:12.5px;color:var(--brume);margin-bottom:14px">Un nombre par saison, séparés par des virgules.</p>`
    :`<label class="eyebrow">Durée en minutes</label>
    <input id="md" inputmode="numeric" placeholder="155" style="margin:6px 0 14px">`}
    <div id="merr" class="err" style="margin-bottom:10px"></div>
    <button class="btn" style="width:100%" id="mok">Ajouter</button>
  `, el=>{
    el.querySelector("#mt").focus();
    el.querySelector("#mok").onclick = ()=>{
      const err = el.querySelector("#merr");
      const titre = el.querySelector("#mt").value.trim();
      const annee = el.querySelector("#ma").value.trim();
      if(!titre){ err.textContent="Il faut un titre."; return; }
      if(serie){
        const nums = el.querySelector("#ms").value.split(",").map(x=>parseInt(x.trim(),10)).filter(n=>n>0);
        if(!nums.length){ err.textContent="Indique au moins un nombre d'épisodes."; return; }
        D.series.push({ id:uid(), tmdbId:null, titre, annee, poster:null,
          saisons: nums.map((n,i)=>({ n:i+1, episodes:Array.from({length:n},(_,j)=>({n:j+1,titre:"",duree:null})) })),
          vus:{}, ajoute:new Date().toISOString() });
      }else{
        D.films.push({ id:uid(), tmdbId:null, titre, annee, poster:null, duree:parseInt(el.querySelector("#md").value,10)||null, vuLe:null, ajoute:new Date().toISOString() });
      }
      sauver(); invaliderSuggestions(); fermer(); rendre(); toast("Ajouté");
    };
  });
}

/* ============ feuille générique ============ */
function feuille(html, apres){
  fermer();
  const d = document.createElement("div");
  d.className = "sheet";
  d.innerHTML = `<div><button class="fermer-x" aria-label="Fermer">×</button>${html}</div>`;
  d.onclick = e => { if(e.target===d) fermer(); };
  d.querySelector(".fermer-x").onclick = fermer;
  document.body.appendChild(d);
  ouvert = d;
  if(apres) apres(d);
}
function fermer(){ if(ouvert){ ouvert.remove(); ouvert=null; } }
let tid;
function toast(m){
  document.querySelector(".toast")?.remove();
  const t = document.createElement("div"); t.className="toast"; t.textContent=m;
  document.body.appendChild(t); clearTimeout(tid); tid=setTimeout(()=>t.remove(),2000);
}

/* ============ événements ============ */
document.addEventListener("click", e=>{
  const c = s => e.target.closest(s);
  let b;
  if((b=c("[data-page]"))){ page=b.dataset.page; fermer(); rendre(); window.scrollTo(0,0); return; }
  if((b=c("[data-ong]"))){ histOnglet=b.dataset.ong; rendre(); return; }
  if((b=c("[data-hs]"))){
    const id=b.dataset.hs;
    histSerieOuv.has(id) ? histSerieOuv.delete(id) : histSerieOuv.add(id);
    rendre(); return;
  }
  if((b=c("[data-hsa]"))){
    const k=b.dataset.hsa;
    histSaisonOuv.has(k) ? histSaisonOuv.delete(k) : histSaisonOuv.add(k);
    rendre(); return;
  }
  if((b=c("[data-dec]"))){ decOnglet=b.dataset.dec; decQ=""; clearTimeout(decTimer); rendre(); return; }
  if((b=c("[data-decf]"))){ decFiltre=b.dataset.decf; rendre(); return; }
  if(c("[data-decretry]")){ decCache[decOnglet]=null; chargerDecouv(); return; }
  if((b=c("[data-decadd]"))){
    const [type, idStr] = b.dataset.decadd.split(":"); const id = Number(idStr);
    if(dansMaListe(id,type)) return;
    // le bouton est soit dans la fiche descriptive (feuille), soit sur une tuile Découverte
    const enFiche = !!b.closest(".sheet");
    const plus = b.querySelector(".plus");
    if(plus) plus.innerHTML = '<span class="spin" style="width:13px;height:13px;border-width:2px;border-top-color:#2A1D07;border-color:rgba(42,29,7,.3);border-top-color:#2A1D07"></span>';
    b.disabled = true;
    (async()=>{
      try{
        if(type==="series") D.series.push(await importerSerie(id));
        else D.films.push(await importerFilm(id));
        sauver();
        invaliderSuggestions(); decCache.sorties = null;
        if(enFiche){ fermer(); rendre(); toast(type==="series" ? "Série ajoutée" : "Film ajouté"); }
        else{
          b.classList.add("dedans"); plus?.remove();
          const pq = b.querySelector(".pq"); if(pq) pq.textContent = "déjà dans ta liste";
          toast(type==="series" ? "Série ajoutée" : "Film ajouté");
        }
      }catch(err){ b.disabled=false; if(plus) plus.textContent="+"; toast(err.message); }
    })();
    return;
  }
  if((b=c("[data-vu]"))){
    const s = D.series.find(x=>x.id===b.dataset.vu); const ep = suivant(s);
    if(ep){ marquer(s, ep.saison, ep.n, true); rendre(); toast(fini(s)?"Série terminée":"S"+String(ep.saison).padStart(2,"0")+"E"+String(ep.n).padStart(2,"0")+" coché"); }
    return;
  }
  if((b=c("[data-detail]"))){ detail(b.dataset.detail); return; }
  if((b=c("[data-ffiche]"))){
    const [type, id] = b.dataset.ffiche.split(":");
    const item = (type==="series"?D.series:D.films).find(x=>x.id===id);
    if(item) ficheDescription(type, item.tmdbId, id);
    return;
  }
  if((b=c("[data-htf]"))){ histFilmTri=b.dataset.htf; rendre(); return; }
  if((b=c("[data-filmvu]"))){ const f=D.films.find(x=>x.id===b.dataset.filmvu); f.vuLe=new Date().toISOString(); sauver(); fermer(); rendre(); toast("Vu — dans l'historique"); return; }
  if((b=c("[data-filmrevu]"))){ const f=D.films.find(x=>x.id===b.dataset.filmrevu); f.vuLe=null; sauver(); rendre(); toast("Remis à voir"); return; }
  if((b=c("[data-filmsup]"))){ const f=D.films.find(x=>x.id===b.dataset.filmsup); if(confirm("Retirer « "+f.titre+" » ?")){ D.films=D.films.filter(x=>x.id!==f.id); sauver(); invaliderSuggestions(); fermer(); rendre(); toast("Film retiré"); } return; }

  if(c("#fab")){ ajouter(); return; }

  if(c("#saveCle")){ D.tmdb=$("#cleTmdb").value.trim(); sauver(); $("#cleEtat").textContent = aCle()?"Clé enregistrée.":"Aucune clé — mode saisie manuelle."; return; }
  if((b=c("#testCle"))){
    const et=$("#cleEtat"); D.tmdb=$("#cleTmdb").value.trim();
    et.innerHTML='<span class="spin"></span>';
    tmdb("/search/tv",{query:"test"}).then(()=>{ sauver(); et.textContent="La clé fonctionne. Enregistrée."; et.style.color="var(--beurre)"; })
      .catch(err=>{ et.textContent=err.message; et.style.color="var(--rose)"; });
    return;
  }
  if(c("#exp")){
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([JSON.stringify(D,null,2)],{type:"application/json"}));
    a.download="suivi-"+new Date().toISOString().slice(0,10)+".json"; a.click(); URL.revokeObjectURL(a.href);
    return;
  }
  if(c("#imp")){
    const i=document.createElement("input"); i.type="file"; i.accept=".json";
    i.onchange=()=>{ const f=i.files[0]; if(!f) return; const r=new FileReader();
      r.onload=()=>{ try{ const d=JSON.parse(r.result);
          if(!Array.isArray(d.series)||!Array.isArray(d.films)) throw new Error("Ce fichier n'a pas le bon format.");
          D=Object.assign({series:[],films:[],tmdb:D.tmdb}, d); sauver(); invaliderSuggestions(); rendre(); toast("Données importées");
        }catch(e){ alert(e.message); } };
      r.readAsText(f); };
    i.click(); return;
  }
  if(c("#raz")){
    if(confirm("Effacer séries, films et historique ? C'est définitif.")){
      D={series:[],films:[],tmdb:D.tmdb}; sauver(); invaliderSuggestions(); rendre(); toast("Données effacées");
    }
    return;
  }
});
document.addEventListener("keydown", e=>{ if(e.key==="Escape") fermer(); });

charger(); rendre();
</script>
